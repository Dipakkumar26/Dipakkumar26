  <text x="26" y="74" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace" font-size="13.5" fill="#E7ECF7" xml:space="preserve">▸ Architected a 3-role agri-commerce platform: 15+ screens, 10+</text><text x="26" y="95" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace" font-size="13.5" fill="#8291B4" xml:space="preserve">  APIs for marketplace, verification &amp; order workflows.</text><text x="26" y="137" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace" font-size="13.5" fill="#E7ECF7" xml:space="preserve">▸ Built an AI-enabled Tamil voice-to-listing system (speech</text><text x="26" y="158" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace" font-size="13.5" fill="#8291B4" xml:space="preserve">  recognition + translation + LLM extraction) auto-filling 5</text><text x="26" y="179" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace" font-size="13.5" fill="#8291B4" xml:space="preserve">  product fields.</text><text x="26" y="221" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace" font-size="13.5" fill="#E7ECF7" xml:space="preserve">▸ Automated real-time inventory sync &amp; transactional order</text><text x="26" y="242" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace" font-size="13.5" fill="#8291B4" xml:space="preserve">  processing with JWT auth and role-based access control.</text>

