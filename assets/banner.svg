<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050912"/>
      <stop offset="55%" stop-color="#0A1330"/>
      <stop offset="100%" stop-color="#081C2E"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64FFDA"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#C792EA"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bgGrad)"/>
  <path d="M0,40 H180 V90 H420" stroke="#16233F" stroke-width="2" fill="none"/><path d="M1200,60 H980 V20 H760" stroke="#16233F" stroke-width="2" fill="none"/><path d="M0,260 H140 V210 H320 V240" stroke="#16233F" stroke-width="2" fill="none"/><path d="M1200,250 H1040 V280 H860" stroke="#16233F" stroke-width="2" fill="none"/><path d="M60,300 V220 H0" stroke="#16233F" stroke-width="2" fill="none"/><path d="M1140,0 V70 H1200" stroke="#16233F" stroke-width="2" fill="none"/>
  <circle cx="180" cy="40" r="3.5" fill="#1E3358"/><circle cx="420" cy="90" r="3.5" fill="#1E3358"/><circle cx="980" cy="60" r="3.5" fill="#1E3358"/><circle cx="760" cy="20" r="3.5" fill="#1E3358"/><circle cx="140" cy="260" r="3.5" fill="#1E3358"/><circle cx="320" cy="210" r="3.5" fill="#1E3358"/><circle cx="1040" cy="250" r="3.5" fill="#1E3358"/><circle cx="860" cy="280" r="3.5" fill="#1E3358"/><circle cx="60" cy="220" r="3.5" fill="#1E3358"/>

  <!-- top accent rule -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentGrad)"/>

  <!-- kicker -->
  <text x="60" y="92" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace" font-size="15" letter-spacing="4" fill="#64FFDA">SYSTEM.INIT // SOFTWARE_ENGINEER.PROFILE</text>

  <!-- name -->
  <text x="58" y="160" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace" font-size="58" font-weight="700" letter-spacing="1" fill="#E7ECF7" filter="url(#glow)">Dipak Kumar B</text>

  <!-- underline trace with pulse -->
  <line x1="60" y1="182" x2="1140" y2="182" stroke="#16233F" stroke-width="2"/>
  <circle cx="60" cy="182" r="4" fill="#64FFDA">
    <animate attributeName="cx" values="60;1140;60" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#64FFDA;#38BDF8;#C792EA;#64FFDA" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- tagline -->
  <text x="60" y="222" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace" font-size="19" fill="#7D8AA8">Electrical &amp; Electronics Engineer  ·  Full-Stack Developer  ·  AI/ML Builder</text>

  <!-- chips -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace" font-size="13" fill="#E7ECF7">
    <rect x="60" y="246" width="150" height="30" rx="15" fill="#0B1428" stroke="#1E3358"/>
    <text x="78" y="266">📍 Chennai, India</text>

    <rect x="222" y="246" width="230" height="30" rx="15" fill="#0B1428" stroke="#1E3358"/>
    <text x="240" y="266">🎓 B.E. EEE @ SSN College</text>

    <rect x="464" y="246" width="230" height="30" rx="15" fill="#0B1428" stroke="#1E3358"/>
    <text x="482" y="266">⚡ CGPA 8.52 / 10.0</text>

    <rect x="706" y="246" width="255" height="30" rx="15" fill="#0B1428" stroke="#1E3358"/>
    <text x="724" y="266">🤖 Ex-AI/ML Intern, Xzyntrix</text>
  </g>
</svg>